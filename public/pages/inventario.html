<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario — Helados Chun Blum</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="pagina">

  <!-- Sidebar (escritorio) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Helados Chun Blum</h1>
      <p>Cargando...</p>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button id="btnCerrarSesionSidebar">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Navbar (móvil) -->
  <nav class="navbar">
    <h2>Inventario</h2>
    <div class="navbar-acciones">
      <button class="btn-cerrar-sesion" id="btnCerrarSesion">Salir</button>
    </div>
  </nav>

  <!-- Contenido -->
  <div class="contenido">

    <!-- Tarjetas de resumen -->
    <div class="inventario-stats">
      <div class="stat-card stat-disponible">
        <div class="stat-numero" id="statDisponible">—</div>
        <div class="stat-label">Disponibles</div>
      </div>
      <div class="stat-card stat-agotado">
        <div class="stat-numero" id="statAgotado">—</div>
        <div class="stat-label">Agotados</div>
      </div>
      <div class="stat-card stat-produccion">
        <div class="stat-numero" id="statProduccion">—</div>
        <div class="stat-label">En producción</div>
      </div>
    </div>

    <!-- Lista de productos -->
    <div class="card">
      <div class="card-header">
        <h3>Productos</h3>
      </div>

      <!-- Indicador tiempo real -->
      <div class="indicador-tiempo-real">
        <div class="punto-verde"></div>
        <span>Actualizando en tiempo real</span>
      </div>

      <!-- Filtros -->
      <div class="filtros-bar">
        <input
          type="text"
          id="buscador"
          class="filtro-input"
          placeholder="Buscar por nombre o referencia..."
        />
        <select id="filtroEstado" class="filtro-select">
          <option value="">Todos los estados</option>
          <option value="disponible">Disponible</option>
          <option value="agotado">Agotado</option>
          <option value="en_produccion">En producción</option>
        </select>
        <select id="filtroStock" class="filtro-select">
          <option value="">Todo el stock</option>
          <option value="bajo">Stock bajo</option>
          <option value="normal">Stock normal</option>
        </select>
      </div>

      <!-- Header tabla (solo desktop) -->
      <div class="tabla-header">
        <span>Producto</span>
        <span>Stock</span>
        <span>Estado</span>
        <span>Última actualización</span>
      </div>

      <!-- Lista -->
      <div id="listaProductos">
        <div class="loading">Cargando inventario...</div>
      </div>

    </div>

  </div>

  <script type="module" src="../js/inventario.js"></script>

</body>
</html>
