<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios — Helados Chun Blum</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="pagina">

  <!-- Sidebar (escritorio) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Helados Chun Blum</h1>
      <p>Cargando...</p>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button id="btnCerrarSesionSidebar">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Navbar (móvil) -->
  <nav class="navbar">
    <button class="btn-menu" id="btnMenu">☰</button>
    <h2>Usuarios</h2>
    <button class="btn-cerrar-sesion" id="btnCerrarSesion">Salir</button>
  </nav>

  <!-- Contenido -->
  <div class="contenido">

    <div class="card">
      <div class="card-header">
        <h3>Usuarios registrados</h3>
        <button class="btn-primario btn-sm" id="btnNuevoUsuario">+ Nuevo</button>
      </div>

      <!-- Filtros -->
      <div class="filtros-bar">
        <input
          type="text"
          id="buscador"
          class="filtro-input"
          placeholder="Buscar por nombre o correo..."
        />
        <select id="filtroRol" class="filtro-select">
          <option value="">Todos los roles</option>
          <option value="admin">Admin</option>
          <option value="operaria">Operaria</option>
          <option value="vendedor">Vendedor</option>
          <option value="distribuidor">Distribuidor</option>
        </select>
        <select id="filtroEstado" class="filtro-select">
          <option value="">Todos los estados</option>
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>
      
      <div id="listaUsuarios">
        <div class="loading">Cargando usuarios...</div>
      </div>

    </div>

  </div>

  <!-- Modal crear usuario -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Nuevo usuario</h3>

      <div class="alert-error" id="alertaModal"></div>

      <div class="form-group">
        <label for="modalNombre">Nombre completo</label>
        <input type="text" id="modalNombre" placeholder="Nombre del usuario" />
        <span class="error-msg" id="errorNombre">Ingresa el nombre.</span>
      </div>

      <div class="form-group">
        <label for="modalEmail">Correo electrónico</label>
        <input type="email" id="modalEmail" placeholder="correo@ejemplo.com" />
        <span class="error-msg" id="errorEmail">Ingresa un correo válido.</span>
      </div>

      <div class="form-group">
        <label for="modalPassword">Contraseña inicial</label>
        <input type="password" id="modalPassword" placeholder="Mínimo 6 caracteres" />
        <span class="error-msg" id="errorPassword">Mínimo 6 caracteres.</span>
      </div>

      <div class="form-group">
        <label for="modalRol">Rol</label>
        <select id="modalRol" style="width:100%;padding:10px 14px;border:1px solid var(--gris-borde);border-radius:var(--radio);font-size:15px;color:var(--gris-texto);background:var(--blanco);outline:none;">
          <option value="distribuidor">Distribuidor</option>
          <option value="operaria">Operaria</option>
          <option value="vendedor">Vendedor</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <div class="modal-acciones">
        <button class="btn-secundario" id="btnCancelarModal">Cancelar</button>
        <button class="btn-primario" id="btnGuardarUsuario">Guardar</button>
      </div>

    </div>
  </div>

  <script type="module" src="../js/usuarios.js"></script>

</body>
</html>
