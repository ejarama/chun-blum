<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Helados Chun Blum</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="login-page">

  <div class="login-layout">

    <!-- Panel de marca (visible solo en escritorio) -->
    <div class="login-branding">
      <div class="login-branding-content">
        <div class="login-brand-logo">
          <img src="../img/logo.png" alt="Logo Helados Chun Blum">
        </div>
        <h2 class="login-brand-nombre">Helados Chun Blum</h2>
        <p class="login-brand-slogan">Sistema de gestión de pedidos</p>
      </div>
    </div>

    <!-- Panel del formulario -->
    <div class="login-form-panel">
      <div class="login-container">

        <div class="login-logo">
          <h1>Iniciar sesión</h1>
          <p>Ingresa a tu cuenta</p>
        </div>

        <div class="alert-error" id="alertaError">
          Usuario o contraseña incorrectos. Intenta de nuevo.
        </div>

        <form id="formLogin" novalidate>

          <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input
              type="email"
              id="correo"
              placeholder="correo@ejemplo.com"
              autocomplete="email"
              required
            />
            <span class="error-msg" id="errorCorreo">
              Ingresa un correo válido.
            </span>
          </div>

          <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input
              type="password"
              id="contrasena"
              placeholder="Tu contraseña"
              autocomplete="current-password"
              required
            />
            <span class="error-msg" id="errorContrasena">
              La contraseña no puede estar vacía.
            </span>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            Ingresar
          </button>

        </form>

      </div>
    </div>

  </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "permisos") {
      document.getElementById("alertaError").textContent =
        "No tienes permisos para acceder a esa sección.";
      document.getElementById("alertaError").classList.add("visible");
    }
  </script>
  <script type="module" src="../js/auth.js"></script>

</body>
</html>
